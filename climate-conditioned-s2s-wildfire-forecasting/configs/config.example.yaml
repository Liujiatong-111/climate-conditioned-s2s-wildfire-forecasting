# SeasFire TeleViT Configuration

data:
  # 数据路径（请改成本机 zarr 路径；输入变量和目标变量可在同一个 zarr 中）
  zarr_path: data/SeasFireCube_v3.zarr
  target_zarr_path: data/SeasFireCube_v3.zarr

  # 变量列表（10 个火驱动变量）
  fire_vars:
    - lst_day      # 白天地表温度
    - mslp         # 海平面气压
    - ndvi         # 植被指数
    - pop_dens     # 人口密度（需 log 变换）
    - ssrd         # 短波辐射
    - sst          # 海表温度
    - swvl1        # 土壤湿度
    - t2m_mean     # 平均温度
    - tp           # 总降水（需 log 变换）
    - vpd          # 蒸汽压差

  # 需要 log 变换的变量
  log_transform_vars:
    - tp
    - pop_dens

  # 海气指数（10 个）
  oci_vars:
    - oci_censo
    - oci_ea
    - oci_epo
    - oci_gmsst
    - oci_nao
    - oci_nina34_anom
    - oci_pdo
    - oci_pna
    - oci_soi
    - oci_wp

  # 目标变量
  target_var: gwis_ba

  # 年份划分
  # 训练集：2002-2019（共18年，所有可用数据）
  # 验证集：每个epoch从训练集中随机选择2年（动态验证）
  # 测试集：独立的测试数据（训练结束后评估）
  train_years: [2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019]
  val_years: [2009, 2015]  # 占位符，实际训练时每个epoch随机选择
  test_years: [2018, 2019]  # 测试集

  # 时间参数
  lead_time_steps: 1      # 预测未来多少个 8-day 步长
  oci_window: 10          # OCI 时间窗口长度（10步 × 8天 = 80天）
  temporal_steps: 16      # Local/Global 的时间步数（16步 × 8天 = 128天）【新架构：使用时空混合器】

  # 目标二值化阈值
  burn_threshold: 0.0

  # Patch 参数
  patch_size: 80          # Local patch 大小
  global_coarsen_factor: 4  # Global 下采样因子（0.25° -> 1°）

model:
  # 三种输入开关（用于 ablation study）
  use_local: true
  use_global: true
  use_oci: true

  # 损失函数配置（与 televit-main 完全一致）
  # - 使用 CrossEntropyLoss（3 类分类，ignore_index=2）
  # - 模型输出: (B, 3, 80, 80)
  # - 数据集返回: y=(B, 80, 80) 二值标签(0/1), mask=(B, 80, 80) NDVI掩码
  # - 训练时: y[mask==1]=2，然后用 CrossEntropyLoss(ignore_index=2) 计算损失
  # - 预测时: probs=softmax(logits)[:,1]，然后 probs[mask==1]=0
  # - 掩码来源: NDVI 的 NaN（约77%，包括海洋+沙漠等不适合植被的区域）

  # 是否加载 ImageNet 预训练的 ViT-B/16 权重
  load_pretrained_backbone: false  # 实验11: 从头训练（不使用预训练权重）

  # ViT 配置（优化后，参考TeleViT1.0 ablation结果）
  embed_dim: 768
  depth: 12   # Transformer 的层数（训练时使用12层）
  num_heads: 12  # 每层的注意力头数量（保持12个头）
  mlp_ratio: 2.0  # MLP维度比例（TeleViT1.0: 2.0最优，4.0会过拟合）

  # Local patch embedding
  local_patch_size: 8    # patch 8x8 (10×10 tokens, 时序池化后100 tokens)

  # Global patch embedding
  global_patch_size: 30   # patch 30x30 (6×12 tokens, 时序池化后72 tokens)

  # 分割头类型
  seg_head_type: patchwise  # 'patchwise' (默认), 'progressive', 'unet', 'aspp', 'improved'
  use_improved_head: false

  # 【新架构：时空Token混合器】✅ 已集成到编码器中
  # - SpatialTokenMixer2D: 在patch-grid上增强空间连续性（depthwise 3×3 conv）
  # - TemporalTokenMixerTCN: 每个patch位置沿时间建模（因果1D conv）
  # - ContextFiLM: Global/OCI → Local 特征调制
  # - TemporalAttentionPoolMHA: 基于Query的多头注意力时序池化
  # - ViT Encoder dropout=0.1: 抑制过拟合

  # 旧配置（已废弃，新架构直接集成）
  use_tcn: false
  tcn_kernel_size: 3
  tcn_num_layers: 1
  use_causal_conv: false
  use_temporal_transformer: false
  temporal_transformer_layers: 2
  temporal_transformer_heads: 8

train:
  batch_size: 96  # 优化：降低到96以适应时序Transformer的显存需求
  num_workers: 4
  epochs: 150  # 充足的训练轮数

  # 优化器配置
  optimizer: adam  # 使用 Adam
  learning_rate: 0.000225  # 优化：相应调整 3e-4 * (96/128) = 2.25e-4
  weight_decay: 0.000001  # 1e-6（保持不变）

  # 学习率调度（Warmup + CosineAnnealingWarmRestarts）
  lr_scheduler: cosine_warmup
  warmup_epochs: 5  # Warmup 阶段的轮数
  cosine_T0: 20  # Cosine 重启周期
  cosine_T_mult: 2  # 周期倍增因子
  cosine_eta_min: 0.000001  # 最小学习率 1e-6

  # 其他
  device: cuda
  gpu_ids: [0,1,3,4,5,7]  # 指定使用的GPU卡号
  seed: 42

  # 早停
  patience: 25  # 优化：增加patience到25（时序Transformer需要更多epoch收敛）

output:
  save_dir: outputs
  log_interval: 50        # 多少 batch 打印一次
  save_predictions: true  # 是否保存验证集预测结果
