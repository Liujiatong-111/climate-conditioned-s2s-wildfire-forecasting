# Example configuration for TeleViT wildfire forecasting.

data:
  # Set these paths before running.
  zarr_path: data/SeasFireCube_v3.zarr
  target_zarr_path: data/SeasFireCube_v3.zarr

  # Fire drivers.
  fire_vars:
    - lst_day
    - mslp
    - ndvi
    - pop_dens
    - ssrd
    - sst
    - swvl1
    - t2m_mean
    - tp
    - vpd

  log_transform_vars:
    - tp
    - pop_dens

  # Ocean-climate indices.
  oci_vars:
    - oci_censo
    - oci_ea
    - oci_epo
    - oci_gmsst
    - oci_nao
    - oci_nina34_anom
    - oci_pdo
    - oci_pna
    - oci_soi
    - oci_wp

  target_var: gwis_ba

  train_years: [2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019]
  val_years: [2009, 2015]
  test_years: [2018, 2019]

  lead_time_steps: 1
  oci_window: 10
  temporal_steps: 16
  burn_threshold: 0.0

  patch_size: 80
  global_coarsen_factor: 4

model:
  use_local: true
  use_global: true
  use_oci: true

  load_pretrained_backbone: false
  embed_dim: 768
  depth: 12
  num_heads: 12
  mlp_ratio: 2.0

  local_patch_size: 8
  global_patch_size: 30
  seg_head_type: patchwise
  use_improved_head: false

  # Legacy options kept for compatibility.
  use_tcn: false
  tcn_kernel_size: 3
  tcn_num_layers: 1
  use_causal_conv: false
  use_temporal_transformer: false
  temporal_transformer_layers: 2
  temporal_transformer_heads: 8

train:
  batch_size: 96
  num_workers: 4
  epochs: 150

  optimizer: adam
  learning_rate: 0.000225
  weight_decay: 0.000001

  lr_scheduler: cosine_warmup
  warmup_epochs: 5
  cosine_T0: 20
  cosine_T_mult: 2
  cosine_eta_min: 0.000001

  device: cuda
  gpu_ids: [0, 1, 3, 4, 5, 7]
  seed: 42
  patience: 25

output:
  save_dir: outputs
  log_interval: 50
  save_predictions: true
